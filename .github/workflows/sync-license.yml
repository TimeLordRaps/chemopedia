name: Sync License
on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:
jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Pull latest Time License
        run: curl -fsSo LICENSE https://raw.githubusercontent.com/TimeLordRaps/the-time-license/main/LICENSE
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: sync The Time License from canonical repo"
          file_pattern: LICENSE
